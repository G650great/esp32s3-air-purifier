<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 智能配网向导</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00e5ff;
            --primary-dark: #00b8d4;
            --bg-color: #f0f7f9;
            --text-main: #1a365d;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(0, 139, 186, 0.1);
            --danger: #ff4d4d;
            --warning: #ffb300;
            --success: #00e676;
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e0f2f1, #b2ebf2, #80deea);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Abstract Background Elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 229, 255, 0.4);
            top: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite;
        }
        
        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(0, 230, 118, 0.3);
            bottom: -150px;
            right: -100px;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(10deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Main Container */
        .config-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05), var(--neon-glow);
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        
        .config-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), #00e676);
            opacity: 0.8;
        }

        /* Header Area */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            z-index: 5;
        }

        .back-btn:hover {
            background: white;
            color: var(--primary-dark);
            transform: translateX(-3px);
            box-shadow: 0 5px 15px rgba(0, 184, 212, 0.15);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(0, 184, 212, 0.2);
            font-size: 2.5rem;
            color: var(--primary-dark);
            position: relative;
        }
        
        .icon-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 28px;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #00838f, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: color 0.3s;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.7);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.15), inset 0 2px 4px rgba(0,0,0,0.01);
        }

        input[type="text"]:focus + .input-icon,
        input[type="password"]:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--primary-dark);
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }
        
        .toggle-password:hover {
            color: var(--primary-dark);
        }

        /* Scan Button (Networks) */
        .scan-btn {
            position: absolute;
            right: 8px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .scan-btn:hover {
            background: #0097a7;
            transform: scale(1.05);
        }
        
        .scan-btn:active {
            transform: scale(0.95);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-dark), #00838f);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 184, 212, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 184, 212, 0.4);
        }
        
        .submit-btn:hover::before {
            left: 150%;
            transition: all 0.7s;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }
        
        /* Network List Dropdown (Hidden by default) */
        .network-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 0;
            overflow-y: auto;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            z-index: 20;
        }
        
        .network-list.show {
            max-height: 200px;
            opacity: 1;
            padding: 8px;
        }
        
        .network-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .network-item:hover {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary-dark);
            font-weight: 600;
        }
        
        .signal-bars {
            color: var(--success);
            font-size: 0.9rem;
        }
        
        /* Loader state */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }
        .submit-btn.loading {
            pointer-events: none;
            background: #cbd5e1;
            box-shadow: none;
        }
        
        /* Success Overlay */
        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 30;
            border-radius: 30px;
            text-align: center;
        }
        
        .success-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s;
        }
        
        .success-overlay.show .success-icon {
            transform: scale(1);
        }
        
        .success-overlay h2 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .config-container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Abstract Backgrounds -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="config-container" id="mainContainer">
        <div class="header">
            <a href="index.html" class="back-btn" title="返回主面板">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="icon-container">
                <i class="fa-solid fa-wifi"></i>
            </div>
            <h1>SmartConfig</h1>
            <p class="subtitle">将净化器连接至您的家庭网络</p>
        </div>

        <form id="configForm">
            <div class="form-group">
                <label for="ssid">WiFi 名称 (SSID)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-network-wired input-icon"></i>
                    <input type="text" id="ssid" name="ssid" placeholder="输入或扫描附近网络" required autocomplete="off">
                    <button type="button" class="scan-btn" id="scanBtn">
                        <i class="fa-solid fa-radar"></i> 扫描
                    </button>
                </div>
                <!-- Mock Network List -->
                <div class="network-list" id="networkList">
                    <div class="network-item" onclick="selectNetwork('Home_WiFi_5G')">
                        <span>Home_WiFi_5G</span>
                        <div class="signal-bars"><i class="fa-solid fa-signal"></i></div>
                    </div>
                    <div class="network-item" onclick="selectNetwork('LivingRoom_2.4G')">
                        <span>LivingRoom_2.4G</span>
                        <div class="signal-bars"><i class="fa-solid fa-signal"></i></div>
                    </div>
                    <div class="network-item" onclick="selectNetwork('Guest_Network')">
                        <span>Guest_Network</span>
                        <div class="signal-bars" style="color: var(--warning);"><i class="fa-solid fa-signal"></i></div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="password">WiFi 密码</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="请输入 WiFi 密码" required>
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="saveCreds" checked style="accent-color: var(--primary-dark); width: 16px; height: 16px;">
                <label for="saveCreds" style="margin: 0; font-weight: 500; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">记住密码 (保存在设备中)</label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">连接网络</span>
                <i class="fa-solid fa-arrow-right btn-text"></i>
                <div class="spinner"></div>
            </button>
        </form>
        
        <!-- Success Overlay -->
        <div class="success-overlay" id="successOverlay">
            <i class="fa-solid fa-circle-check success-icon"></i>
            <h2>配置已发送</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; padding: 0 20px;">
                ESP32 正在尝试连接路由器...<br>连接成功后，设备将自动重启并连接 MQTT 服务器。
            </p>
        </div>
    </div>

    <script>
        // DOM Elements
        const ssidInput = document.getElementById('ssid');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const scanBtn = document.getElementById('scanBtn');
        const networkList = document.getElementById('networkList');
        const configForm = document.getElementById('configForm');
        const submitBtn = document.getElementById('submitBtn');
        const successOverlay = document.getElementById('successOverlay');
        const mainContainer = document.getElementById('mainContainer');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Scan Networks (Mock functionality)
        scanBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Add a little spin animation to the radar icon
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            
            // Simulate network scan delay
            setTimeout(() => {
                icon.classList.remove('fa-spin');
                networkList.classList.toggle('show');
            }, 600);
        });

        // Select Network from list
        window.selectNetwork = function(ssid) {
            ssidInput.value = ssid;
            networkList.classList.remove('show');
            // Focus password field automatically for better UX
            passwordInput.focus();
        };

        // Close network list when clicking outside
        document.addEventListener('click', function(e) {
            if (!ssidInput.contains(e.target) && !scanBtn.contains(e.target) && !networkList.contains(e.target)) {
                networkList.classList.remove('show');
            }
        });

        // Handle Form Submission (Simulate sending to ESP32 via AP mode)
        configForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 1. Validate inputs
            const ssid = ssidInput.value.trim();
            const password = passwordInput.value.trim();
            
            if(!ssid) return;

            // 2. Show loading state
            submitBtn.classList.add('loading');
            
            // In a real ESP32 project, you would send this data via fetch/AJAX
            // to the ESP32's local web server (e.g., http://192.168.4.1/save)
            /*
            fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `ssid=${encodeURIComponent(ssid)}&password=${encodeURIComponent(password)}`
            }).then(...)
            */

            // 3. Simulate network request delay (2 seconds)
            setTimeout(() => {
                submitBtn.classList.remove('loading');
                
                // Show success animation
                successOverlay.classList.add('show');
                
                // Optional: add a slight glow to the whole container
                mainContainer.style.boxShadow = "0 20px 50px rgba(0, 230, 118, 0.2), 0 0 25px rgba(0, 230, 118, 0.5)";
                
                // After 5 seconds, you might want to redirect the user or close the window
                // since the ESP32 AP will disconnect once it joins the home network.
            }, 2000);
        });
    </script>
</body>
</html>
